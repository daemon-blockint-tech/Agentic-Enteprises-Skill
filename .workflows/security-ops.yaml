# Security Operations Workflow
# CTI → hunt → offensive → defensive → D3FEND (7) → compliance → incident

name: security-ops
description: Full security audit with threat intel, D3FEND response, and incident closure
version: 1.2.0

package:
  id: daemon-blockint-tech/Agentic-Enteprises-Skill
  registry: .docs/SKILL_REGISTRY.md
  skills_sh: https://skills.sh/daemon-blockint-tech/Agentic-Enteprises-Skill

install:
  chain_cursor: >-
    npx skills add daemon-blockint-tech/Agentic-Enteprises-Skill
    --skill cti-analyst --skill threat-hunter
    --skill offensive-security-analyst --skill defensive-security-analyst
    --skill d3fend-harden --skill d3fend-detect --skill d3fend-evict
    --skill d3fend-isolate --skill d3fend-restore --skill d3fend-model
    --skill d3fend-deceive --skill compliance-engineer
    --skill incident-management-engineer --agent cursor -y

execution_mode: chain
timeout_per_skill: 600s
max_retries: 1

skills:
  - name: cti-analyst
    skills_sh_folder: cti-analyst
    position: 1
    description: Collect and analyze cyber threat intelligence
    inputs:
      - threat_feeds
      - iocs
      - industry_context
      - priority_assets
    outputs:
      - threat_brief
      - ioc_package
      - hunt_hypotheses
    validation:
      - build-validator:
          checks: [security, compliance]

  - name: threat-hunter
    skills_sh_folder: threat-hunter
    position: 2
    description: Proactive threat hunting based on CTI and telemetry
    inputs:
      - threat_brief
      - ioc_package
      - log_sources
      - detection_gaps
    outputs:
      - hunt_findings
      - detection_candidates
      - scope_recommendations
    validation:
      - build-validator:
          checks: [security]

  - name: offensive-security-analyst
    skills_sh_folder: offensive-security-analyst
    position: 3
    description: Conduct penetration testing and vulnerability assessment
    inputs:
      - hunt_findings
      - target_systems
      - scope
      - attack_vectors
    outputs:
      - vulnerability_report
      - exploit_demonstrations
      - remediation_recommendations
    validation:
      - build-validator:
          checks: [security, compliance]

  - name: defensive-security-analyst
    skills_sh_folder: defensive-security-analyst
    position: 4
    description: Defensive operations and monitoring alignment
    inputs:
      - vulnerability_report
      - threat_intelligence
      - monitoring_data
      - security_policies
    outputs:
      - threat_detection
      - monitoring_setup
      - incident_analysis
      - defensive_recommendations
    validation:
      - build-validator:
          checks: [security, compliance]

  - name: d3fend-harden
    skills_sh_folder: d3fend-harden
    position: 5
    description: Harden systems against identified threats
    inputs:
      - defensive_recommendations
      - system_configs
      - hardening_criteria
    outputs:
      - hardening_plan
      - security_controls
      - configuration_changes
    validation:
      - build-validator:
          checks: [security, compliance]

  - name: d3fend-detect
    skills_sh_folder: d3fend-detect
    position: 6
    description: Implement threat detection mechanisms
    inputs:
      - hardening_plan
      - detection_criteria
      - monitoring_requirements
    outputs:
      - detection_rules
      - monitoring_setup
      - alert_configuration
    validation:
      - build-validator:
          checks: [security, performance]

  - name: d3fend-evict
    skills_sh_folder: d3fend-evict
    position: 7
    description: Evict identified threats from systems
    inputs:
      - detection_rules
      - threat_indicators
      - eviction_criteria
    outputs:
      - eviction_plan
      - threat_removal_steps
      - verification_procedures
    validation:
      - build-validator:
          checks: [security, compliance]

  - name: d3fend-isolate
    skills_sh_folder: d3fend-isolate
    position: 8
    description: Isolate compromised systems
    inputs:
      - eviction_plan
      - network_topology
      - isolation_criteria
    outputs:
      - isolation_plan
      - network_segmentation
      - containment_procedures
    validation:
      - build-validator:
          checks: [security, architecture]

  - name: d3fend-restore
    skills_sh_folder: d3fend-restore
    position: 9
    description: Restore systems to secure state
    inputs:
      - isolation_plan
      - backup_data
      - restoration_criteria
    outputs:
      - restoration_plan
      - recovery_procedures
      - verification_steps
    validation:
      - build-validator:
          checks: [security, architecture, performance]

  - name: d3fend-model
    skills_sh_folder: d3fend-model
    position: 10
    description: Model threats and update security posture
    inputs:
      - restoration_plan
      - threat_models
      - modeling_criteria
    outputs:
      - updated_threat_models
      - security_posture_assessment
      - risk_analysis
    validation:
      - build-validator:
          checks: [security, architecture]

  - name: d3fend-deceive
    skills_sh_folder: d3fend-deceive
    position: 11
    description: Implement deception technology
    inputs:
      - updated_threat_models
      - deception_criteria
      - honeypot_requirements
    outputs:
      - deception_plan
      - honeypot_setup
      - attacker_tracking
    validation:
      - build-validator:
          checks: [security, architecture]

  - name: compliance-engineer
    skills_sh_folder: compliance-engineer
    position: 12
    description: Compliance audit and documentation
    inputs:
      - deception_plan
      - compliance_requirements
      - regulatory_rules
      - audit_criteria
    outputs:
      - compliance_report
      - audit_results
      - remediation_plan
    validation:
      - build-validator:
          checks: [security, compliance]

  - name: incident-management-engineer
    skills_sh_folder: incident-management-engineer
    position: 13
    description: Incident response closure and post-mortem
    inputs:
      - compliance_report
      - incident_reports
      - response_procedures
      - stakeholder_lists
    outputs:
      - incident_response_plan
      - post_mortem
      - stakeholder_communications
    validation:
      - build-validator:
          checks: [security, compliance, architecture]

triggers:
  - "full security audit"
  - "penetration test with response"
  - "security assessment with D3FEND"
  - "end-to-end security operations"
  - "security audit and response"
  - "threat hunt and remediate"

error_handling:
  on_failure:
    - retry: true
      max_retries: 1
    - fallback: escalate_to_security_team
    - notify: true

state_management:
  persistence: ai-memory-developer
  context_passing: structured_json
  validation_points:
    - after: offensive-security-analyst
    - after: d3fend-deceive
    - after: compliance-engineer
