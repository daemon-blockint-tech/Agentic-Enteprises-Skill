# AI Product Development Workflow
# Build AI-powered product from research to deployment

name: ai-product-dev
description: Build AI-powered product from research to deployment
version: 1.0.0

execution_mode: orchestrated
orchestrator: ai-lead-ops
timeout_per_skill: 600s
max_retries: 2

skills:
  - name: business-model-researcher
    position: 1
    description: Research market and business model feasibility
    inputs:
      - product_idea
      - market_data
      - competitor_info
      - business_goals
    outputs:
      - business_model_analysis
      - market_research
      - competitive_landscape
      - strategy_recommendations
    validation:
      - build-validator:
          checks: [architecture, cost]

  - name: ai-researcher
    position: 2
    description: Conduct AI research and feasibility study
    inputs:
      - business_model_analysis (from business-model-researcher)
      - research_question
      - hypotheses
      - data_availability
    outputs:
      - research_findings
      - feasibility_assessment
      - experiment_design
    validation:
      - build-validator:
          checks: [architecture, security]
      - ai-risk-governance:
          checks: [model_risk, data_privacy, bias]

  - name: ml-research-engineer-safeguards
    position: 3
    description: Conduct safe ML research with safeguards
    inputs:
      - research_findings (from ai-researcher)
      - safety_criteria
      - risk_assessments
    outputs:
      - safe_research_plan
      - safeguards_implementation
      - testing_results
    validation:
      - build-validator:
          checks: [security, architecture]
      - ai-risk-governance:
          checks: [model_risk, safety]

  - name: ml-systems-engineer-rl-engineering
    position: 4
    description: Engineer RL systems and reward optimization
    inputs:
      - safe_research_plan (from ml-research-engineer-safeguards)
      - rl_requirements
      - environment_specs
      - reward_criteria
    outputs:
      - rl_system_design
      - training_plan
      - reward_functions
    validation:
      - build-validator:
          checks: [architecture, security, performance]

  - name: ml-infrastructure-engineer-safeguards
    position: 5
    description: Build ML infrastructure with safety safeguards
    inputs:
      - rl_system_design (from ml-systems-engineer-rl-engineering)
      - infrastructure_requirements
      - safety_criteria
      - deployment_specs
    outputs:
      - ml_infrastructure_design
      - deployment_plan
      - safety_safeguards
    validation:
      - build-validator:
          checks: [architecture, security, cost, performance]

  - name: ai-engineer
    position: 6
    description: Develop AI application and integrate models
    inputs:
      - ml_infrastructure_design (from ml-infrastructure-engineer-safeguards)
      - model_specs
      - application_requirements
      - integration_points
    outputs:
      - ai_application
      - integration_code
      - deployment_plan
    validation:
      - build-validator:
          checks: [architecture, security, performance]

  - name: senior-system-architecture
    position: 7
    description: Design system architecture for AI product
    inputs:
      - ai_application (from ai-engineer)
      - business_requirements
      - scalability_needs
      - integration_points
    outputs:
      - architecture_design
      - technology_stack
      - integration_plan
      - scalability_analysis
    validation:
      - build-validator:
          checks: [architecture, security, cost, scalability]

  - name: senior-fullstack-developer
    position: 8
    description: Develop fullstack application
    inputs:
      - architecture_design (from senior-system-architecture)
      - feature_requirements
      - design_mockups
      - integration_apis
    outputs:
      - application_code
      - api_implementations
      - integration_code
      - documentation
    validation:
      - build-validator:
          checks: [architecture, security, performance]

  - name: cybersecurity
    position: 9
    description: Conduct security review and hardening
    inputs:
      - application_code (from senior-fullstack-developer)
      - threat_intelligence
      - security_policies
      - incident_reports
    outputs:
      - security_operations_plan
      - monitoring_setup
      - threat_detection
      - incident_response
    validation:
      - build-validator:
          checks: [security, compliance]

  - name: compliance-engineer
    position: 10
    description: Conduct compliance audit
    inputs:
      - security_operations_plan (from cybersecurity)
      - compliance_requirements
      - regulatory_rules
      - audit_criteria
    outputs:
      - compliance_report
      - audit_results
      - automation_scripts
      - remediation_plan
    validation:
      - build-validator:
          checks: [compliance, security]

  - name: build-validator
    position: 11
    description: Final quality gate
    inputs:
      - compliance_report (from compliance-engineer)
      - all_previous_outputs
    outputs:
      - validation_report
      - go_no_go_decision
      - recommendations
    validation:
      - build-validator:
          checks: [architecture, security, cost, compliance, performance, scalability]

triggers:
  - "build AI product"
  - "develop AI application"
  - "AI product from scratch"
  - "end-to-end AI development"
  - "AI product launch"

error_handling:
  on_failure:
    - retry: true
      max_retries: 2
    - fallback: escalate_to_orchestrator
    - notify: true

state_management:
  persistence: ai-memory-developer
  context_passing: structured_json
  validation_points:
    - after: ai-researcher
    - after: ml-research-engineer-safeguards
    - after: ai-engineer
    - after: cybersecurity
