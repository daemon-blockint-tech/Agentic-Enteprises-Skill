# AI Product Development Workflow
# Business research → AI/ML safeguards → engineering → security → compliance → gate

name: ai-product-dev
description: Build AI-powered product from research to deployment with safeguards
version: 1.2.0

package:
  id: daemon-blockint-tech/Agentic-Enteprises-Skill
  registry: .docs/SKILL_REGISTRY.md
  skills_sh: https://skills.sh/daemon-blockint-tech/Agentic-Enteprises-Skill

install:
  orchestrated_cursor: >-
    npx skills add daemon-blockint-tech/Agentic-Enteprises-Skill
    --skill business-model-researcher --skill ai-researcher
    --skill ml-research-engineer-safeguards --skill agentic-ai-developer
    --skill ml-infrastructure-engineer-safeguards --skill ai-engineer
    --skill senior-system-architecture --skill senior-fullstack-developer
    --skill ai-redteam --skill compliance-engineer --skill build-validator
    --agent cursor -y

execution_mode: orchestrated
orchestrator: ai-lead-ops
timeout_per_skill: 600s
max_retries: 2

skills:
  - name: business-model-researcher
    skills_sh_folder: business-model-researcher
    position: 1
    description: Research market and business model feasibility
    inputs:
      - product_idea
      - market_data
      - competitor_info
      - business_goals
    outputs:
      - business_model_analysis
      - market_research
      - competitive_landscape
      - strategy_recommendations
    validation:
      - build-validator:
          checks: [architecture, cost]

  - name: ai-researcher
    skills_sh_folder: ai-researcher
    position: 2
    description: Conduct AI research and feasibility study
    inputs:
      - business_model_analysis
      - research_question
      - hypotheses
      - data_availability
    outputs:
      - research_findings
      - feasibility_assessment
      - experiment_design
    validation:
      - build-validator:
          checks: [architecture, security]
      - ai-risk-governance:
          checks: [model_risk, data_privacy, bias]

  - name: ml-research-engineer-safeguards
    skills_sh_folder: ml-research-engineer-safeguards
    position: 3
    description: Safe ML research with safeguards
    inputs:
      - research_findings
      - safety_criteria
      - risk_assessments
    outputs:
      - safe_research_plan
      - safeguards_implementation
      - testing_results
    validation:
      - build-validator:
          checks: [security, architecture]
      - ai-risk-governance:
          checks: [model_risk, safety]

  - name: agentic-ai-developer
    skills_sh_folder: agentic-ai-developer
    position: 4
    description: Design agent loops, tools, and orchestration for the product
    inputs:
      - safe_research_plan
      - product_requirements
      - tool_constraints
      - hitl_requirements
    outputs:
      - agent_architecture
      - tool_schemas
      - orchestration_plan
    validation:
      - build-validator:
          checks: [architecture, security]
      - ai-risk-governance:
          checks: [agent_risk, tool_safety]

  - name: ml-infrastructure-engineer-safeguards
    skills_sh_folder: ml-infrastructure-engineer-safeguards
    position: 5
    description: ML infrastructure with safety safeguards
    inputs:
      - agent_architecture
      - infrastructure_requirements
      - safety_criteria
      - deployment_specs
    outputs:
      - ml_infrastructure_design
      - deployment_plan
      - safety_safeguards
    validation:
      - build-validator:
          checks: [architecture, security, cost, performance]

  - name: ai-engineer
    skills_sh_folder: ai-engineer
    position: 6
    description: Develop AI application and integrate models
    inputs:
      - ml_infrastructure_design
      - agent_architecture
      - model_specs
      - application_requirements
    outputs:
      - ai_application
      - integration_code
      - deployment_plan
    validation:
      - build-validator:
          checks: [architecture, security, performance]

  - name: senior-system-architecture
    skills_sh_folder: senior-system-architecture
    position: 7
    description: System architecture for AI product
    inputs:
      - ai_application
      - business_requirements
      - scalability_needs
      - integration_points
    outputs:
      - architecture_design
      - technology_stack
      - integration_plan
      - scalability_analysis
    validation:
      - build-validator:
          checks: [architecture, security, cost, scalability]

  - name: senior-fullstack-developer
    skills_sh_folder: senior-fullstack-developer
    position: 8
    description: Fullstack application development
    inputs:
      - architecture_design
      - feature_requirements
      - design_mockups
      - integration_apis
    outputs:
      - application_code
      - api_implementations
      - integration_code
      - documentation
    validation:
      - build-validator:
          checks: [architecture, security, performance]

  - name: ai-redteam
    skills_sh_folder: ai-redteam
    position: 9
    description: Adversarial testing of AI and application surfaces
    inputs:
      - application_code
      - ai_application
      - attack_vectors
      - security_criteria
    outputs:
      - adversarial_findings
      - mitigation_recommendations
      - retest_plan
    validation:
      - build-validator:
          checks: [security, compliance]

  - name: compliance-engineer
    skills_sh_folder: compliance-engineer
    position: 10
    description: Compliance audit and controls
    inputs:
      - adversarial_findings
      - compliance_requirements
      - regulatory_rules
      - audit_criteria
    outputs:
      - compliance_report
      - audit_results
      - remediation_plan
    validation:
      - build-validator:
          checks: [compliance, security]

  - name: build-validator
    skills_sh_folder: build-validator
    position: 11
    description: Final quality gate
    inputs:
      - compliance_report
      - all_previous_outputs
    outputs:
      - validation_report
      - go_no_go_decision
      - recommendations
    validation:
      - build-validator:
          checks: [architecture, security, cost, compliance, performance, scalability]

triggers:
  - "build AI product"
  - "develop AI application"
  - "AI product from scratch"
  - "end-to-end AI development"
  - "AI product launch"
  - "agentic product build"

error_handling:
  on_failure:
    - retry: true
      max_retries: 2
    - fallback: escalate_to_orchestrator
    - notify: true

state_management:
  persistence: ai-memory-developer
  context_passing: structured_json
  orchestrator_skill: ai-lead-ops
  validation_points:
    - after: ai-researcher
    - after: ml-research-engineer-safeguards
    - after: agentic-ai-developer
    - after: ai-redteam
