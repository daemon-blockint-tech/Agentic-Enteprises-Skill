# Actuarial Credential Workflow
# Foundations → exams → VEE → analyst → associate → fellow path

name: actuarial-credential
description: Actuarial credentialing from foundations through analyst and associate levels
version: 1.2.0

package:
  id: daemon-blockint-tech/Agentic-Enteprises-Skill
  registry: .docs/SKILL_REGISTRY.md
  skills_sh: https://skills.sh/daemon-blockint-tech/Agentic-Enteprises-Skill

install:
  chain_cursor: >-
    npx skills add daemon-blockint-tech/Agentic-Enteprises-Skill
    --skill pre-actuarial-foundations
    --skill advanced-short-term-actuarial-mathematics
    --skill advanced-long-term-actuarial-mathematics
    --skill validation-by-educational-experience
    --skill actuarial-analyst --skill associate-actuary --skill actuary
    --agent cursor -y

execution_mode: chain
timeout_per_skill: 300s
max_retries: 1

skills:
  - name: pre-actuarial-foundations
    skills_sh_folder: pre-actuarial-foundations
    position: 1
    description: Probability, finance, and exam study foundations
    inputs:
      - candidate_background
      - target_society
      - timeline
    outputs:
      - study_plan
      - gap_analysis
      - exam_sequence
    validation:
      - build-validator:
          checks: [compliance]

  - name: advanced-short-term-actuarial-mathematics
    skills_sh_folder: advanced-short-term-actuarial-mathematics
    position: 2
    description: Short-term / P&C actuarial mathematics (ASTAM-level)
    inputs:
      - study_plan
      - syllabus_topics
    outputs:
      - topic_mastery_map
      - practice_plan
      - exam_readiness_assessment
    validation:
      - build-validator:
          checks: [compliance]

  - name: advanced-long-term-actuarial-mathematics
    skills_sh_folder: advanced-long-term-actuarial-mathematics
    position: 3
    description: Long-term life contingencies (ALTAM-level)
    inputs:
      - study_plan
      - syllabus_topics
    outputs:
      - topic_mastery_map
      - practice_plan
      - exam_readiness_assessment
    validation:
      - build-validator:
          checks: [compliance]

  - name: validation-by-educational-experience
    skills_sh_folder: validation-by-educational-experience
    position: 4
    description: VEE course planning and submission workflow
    inputs:
      - transcript
      - target_society
      - completed_courses
    outputs:
      - vee_plan
      - submission_checklist
      - gap_courses
    validation:
      - build-validator:
          checks: [compliance]

  - name: actuarial-analyst
    skills_sh_folder: actuarial-analyst
    position: 5
    description: Hands-on reserving, pricing support, and workpapers
    inputs:
      - vee_plan
      - line_of_business
      - data_package
    outputs:
      - analysis_workpapers
      - reserve_indication
      - documentation_pack
    validation:
      - build-validator:
          checks: [compliance, architecture]

  - name: associate-actuary
    skills_sh_folder: associate-actuary
    position: 6
    description: ASA/ACAS pathway, ethics, and signing readiness
    inputs:
      - analysis_workpapers
      - credential_status
      - governance_requirements
    outputs:
      - credential_roadmap
      - ethics_checklist
      - review_memo
    validation:
      - build-validator:
          checks: [compliance]

  - name: actuary
    skills_sh_folder: actuary
    position: 7
    description: Fellow-level technical sign-off and assumption governance
    inputs:
      - review_memo
      - product_specs
      - regulatory_context
    outputs:
      - technical_memo
      - assumption_documentation
      - sign_off_recommendation
    validation:
      - build-validator:
          checks: [compliance, architecture]

parallel_line_skills:
  - property-casualty-insurance
  - life-health-insurance
  - pension-retirement-funds
  - assumption-setting
  - asset-liability-management
  - actuarial-consulting
  - ifrs
  - appointed-chief-actuary

triggers:
  - "actuarial credential path"
  - "VEE planning"
  - "ASA ACAS roadmap"
  - "actuarial exam study plan"
  - "actuarial analyst workflow"

error_handling:
  on_failure:
    - retry: true
      max_retries: 1
    - fallback: return_error_to_user
    - notify: false

state_management:
  persistence: ai-memory-developer
  context_passing: structured_json
  validation_points:
    - after: validation-by-educational-experience
    - after: actuarial-analyst
